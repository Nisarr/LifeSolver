events {
    worker_connections 1024;
}

http {
    upstream web_app {
        server web-app:3001;
    }

    upstream ai_dashboard {
        server ai-dashboard:3002;
    }

    upstream auth_service {
        server auth-service:4001;
    }

    upstream data_service {
        server data-service:4002;
    }

    server {
        listen 80;
        server_name localhost;

        # ── API Gateway ───────────────────────────────────────────

        # Auth Service
        location /api/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Data Service
        location /api/data/ {
            proxy_pass http://data_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI Service
        location /api/ai/ {
            proxy_pass http://data_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health Check
        location /api/health {
            proxy_pass http://data_service;
            proxy_set_header Host $host;
        }

        # ── AI Dashboard micro-frontend ───────────────────────────

        location /ai/ {
            proxy_pass http://ai_dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Main Web App (default) ────────────────────────────────

        location / {
            proxy_pass http://web_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
